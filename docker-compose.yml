services:
  db:
    image: "postgres"
    expose:
      - 5432
    container_name: keskon-mange-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - keskon-mange-db:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend
    image: keskonmange/keskonmange-backend
    ports:
      - "5000:5000"
    container_name: keskon-mange-backend
    environment:
      CONNECTION_STRING: postgres://${DB_USER}:${DB_PASS}@keskon-mange-db:5432/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -4 -f http://localhost:5000/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 3

volumes:
  keskon-mange-db: